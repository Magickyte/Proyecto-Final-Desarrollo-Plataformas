spring.application.name=uach

# ===============================
# Configuración Base de Datos Oracle
# ===============================
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xepdb1
spring.datasource.username=AdminCarnet
spring.datasource.password=asdfg
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ===============================
# Configuración JPA e Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Estrategias de nomenclatura (camelCase a snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ===============================
# Configuración Thymeleaf
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# Configuración Subida de Archivos (Multipart)
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# Configuración Redis
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# Configuración Caché y Sesiones (Opcional, pero explícito)
# ===============================
spring.cache.type=redis
spring.session.store-type=redis

# ===============================
# Configuración RabbitMQ
# ===============================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
