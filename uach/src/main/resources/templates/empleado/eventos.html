<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Gestión de Eventos')}">
    <title>Gestión de Eventos</title>
</head>

<body class="hold-transition sidebar-mini layout-fixed">
    <div class="wrapper">

        <!-- Navbar -->
        <nav th:replace="~{layout :: navbar}"></nav>

        <!-- Sidebar -->
        <aside th:replace="~{layout :: sidebar-empleado('eventos')}"></aside>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <!-- Content Header (Page header) -->
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">

                    </div>
                </div>
            </div>

            <!-- Main content -->
            <section class="content">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-12">
                            <!-- Card AdminLTE -->
                            <div class="card">
                                <div class="card-header d-flex align-items-center">
                                    <h3 class="card-title">Gestión de Eventos</h3>
                                    <!-- Botón verde alineado a la derecha -->
                                    <a th:href="@{/empleado/eventos/nuevo}" class="btn btn-success ml-auto">
                                        <i class="fas fa-plus"></i> Crear Nuevo Evento
                                    </a>
                                </div>


                                <!-- /.card-header -->
                                <div class="card-body table-responsive p-0">
                                    <table class="table table-hover text-nowrap">
                                        <thead>
                                            <tr>
                                                <th>Nombre</th>
                                                <th>Fecha Evento</th>
                                                <th>Fecha Fin</th>
                                                <th>Ubicación</th>
                                                <th>Puntos</th>
                                                <th>Categoría</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="evento : ${eventos}">
                                                <td th:text="${evento.nombreEvento}"></td>
                                                <td
                                                    th:text="${#temporals.format(evento.fechaInicio, 'dd/MM/yyyy HH:mm')}">
                                                </td>
                                                <td
                                                    th:text="${evento.fechaFin != null ? #temporals.format(evento.fechaFin, 'dd/MM/yyyy HH:mm') : '- - - -  - - - - - - - - -'}">
                                                </td>
                                                <td th:text="${evento.ubicacion}"></td>
                                                <td th:text="${evento.puntos}"></td>
                                                <td th:text="${evento.categoria.nombreCategoria}"></td>
                                            </tr>
                                            <tr th:if="${#lists.isEmpty(eventos)}">
                                                <td colspan="6" class="text-center">No hay eventos registrados.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <!-- /.card-body -->
                            </div>
                            <!-- /.card -->
                        </div>
                    </div>
                </div>
            </section>
            <!-- /.content -->
        </div>

        <!-- Footer -->
        <footer th:replace="~{layout :: footer}"></footer>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>
