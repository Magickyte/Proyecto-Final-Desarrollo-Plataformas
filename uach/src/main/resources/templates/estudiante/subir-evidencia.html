<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Subir Evidencia')}">
    <title>Subir Evidencia</title>
</head>

<body class="hold-transition sidebar-mini layout-fixed">
    <div class="wrapper">

        <!-- Navbar -->
        <nav th:replace="~{layout :: navbar}"></nav>

        <!-- Sidebar -->
        <aside th:replace="~{layout :: sidebar-estudiante('subir-evidencia')}"></aside>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Subir Evidencia de Evento</h1>
                        </div>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">
                    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible">
                        <button type="button" class="close" data-dismiss="alert" aria-hidden="true">&times;</button>
                        <h5><i class="icon fas fa-check"></i> ¡Éxito!</h5>
                        <span th:text="${mensajeExito}"></span>
                    </div>

                    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible">
                        <button type="button" class="close" data-dismiss="alert" aria-hidden="true">&times;</button>
                        <h5><i class="icon fas fa-ban"></i> ¡Error!</h5>
                        <span th:text="${mensajeError}"></span>
                    </div>

                    <div class="row">
                        <div class="col-12">
                            <div class="card card-primary card-outline">
                                <div class="card-header">
                                    <h3 class="card-title">Detalles de la Evidencia</h3>
                                </div>



                                <form th:action="@{/estudiante/guardar-evidencia}" method="post"
                                    enctype="multipart/form-data">
                                    <div class="card-body">
                                        <div class="row">
                                            <div class="col-md-12">
                                                <div class="form-group">
                                                    <label for="eventoSelect">Nombre del Evento</label>
                                                    <select class="form-control" id="eventoSelect" name="id_evento" required>
                                                        <option value="" disabled selected>Selecciona el evento al que
                                                            asististe...</option>
                                                        <option th:each="evento : ${eventos}" th:value="${evento.idEvento}" th:text="${evento.nombreEvento}"></option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="form-group">
                                            <label for="descripcionEvidencia">Descripción del evento</label>
                                            <textarea class="form-control" id="descripcionEvidencia" name="descripcion"
                                                rows="4" placeholder="Escribe un breve resumen..." required maxlength="1000"></textarea>
                                            <small class="form-text text-muted text-right">Máximo 1000 caracteres</small>
                                        </div>

                                        <div class="form-group">
                                            <label for="archivoEvidencia">Evidencia (Solo imágenes)</label>
                                            <div class="input-group">
                                                <div class="custom-file">
                                                    <input type="file" class="custom-file-input" id="archivoEvidencia"
                                                        name="evidencia_file" accept="image/*" required>
                                                    <label class="custom-file-label" for="archivoEvidencia"
                                                        id="labelArchivo">Arrastrar y soltar archivo...</label>
                                                </div>
                                                <div class="input-group-append" id="btnEliminarContainer"
                                                    style="display: none;">
                                                    <button class="btn btn-danger" type="button" id="btnEliminarArchivo"
                                                        title="Quitar archivo">
                                                        <i class="fas fa-times"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            <div class="mt-2" id="vistaPreviaContainer" style="display: none;">
                                                <a href="#" data-toggle="modal" data-target="#modalVistaPrevia"
                                                    id="linkNombreArchivo" class="text-primary font-weight-bold">
                                                    <i class="fas fa-eye"></i> Ver vista previa de: <span></span>
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="card-footer text-right">
                                        <button type="submit" class="btn btn-primary">Enviar Evidencia</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Modal para Vista Previa -->
        <div class="modal fade" id="modalVistaPrevia" tabindex="-1" role="dialog" aria-labelledby="modalLabel"
            aria-hidden="true">
            <div class="modal-dialog modal-lg" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalLabel">Vista Previa de Evidencia</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body text-center">
                        <img id="imagenPrevia" src="" alt="Vista previa" class="img-fluid rounded"
                            style="max-height: 500px;">
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer th:replace="~{layout :: footer}"></footer>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
    <script>
        $(document).ready(function () {
            const $inputFile = $('#archivoEvidencia');
            const $label = $('#labelArchivo');
            const $btnEliminarContainer = $('#btnEliminarContainer');
            const $vistaPreviaContainer = $('#vistaPreviaContainer');
            const $linkNombreArchivo = $('#linkNombreArchivo span');
            const $imagenPrevia = $('#imagenPrevia');

            $inputFile.on('change', function (event) {
                const file = event.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    $label.text(file.name);
                    $linkNombreArchivo.text(file.name);

                    const reader = new FileReader();
                    reader.onload = function (e) {
                        $imagenPrevia.attr('src', e.target.result);
                    }
                    reader.readAsDataURL(file);

                    $btnEliminarContainer.show();
                    $vistaPreviaContainer.show();
                } else {
                    resetearInput();
                }
            });

            $('#btnEliminarArchivo').on('click', function () {
                resetearInput();
            });

            function resetearInput() {
                $inputFile.val('');
                $label.text('Arrastrar y soltar archivo...');
                $imagenPrevia.attr('src', '');
                $btnEliminarContainer.hide();
                $vistaPreviaContainer.hide();
            }
        });
    </script>
</body>

</html>
