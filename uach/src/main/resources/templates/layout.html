<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<!-- Fragmento para el HEAD -->

<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | Carnet Cultural UACH'">Carnet Cultural | Panel</title>

    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <!-- Font Awesome -->
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <!-- Theme style -->
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">

    <!-- Colores personalizados UACH -->
    <style>
        :root {
            --primary-color: #5b2c6f;
            /* Morado UACH */
            --primary-hover: #4a235a;
            --accent-color: #d4af37;
            /* Dorado UACH */
        }

        .bg-primary {
            background-color: var(--primary-color) !important;
            color: #fff !important;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .text-primary {
            color: var(--primary-color) !important;
        }

        .sidebar-dark-primary .nav-sidebar>.nav-item>.nav-link.active,
        .sidebar-light-primary .nav-sidebar>.nav-item>.nav-link.active {
            background-color: var(--primary-color);
            color: #fff;
        }

        .brand-link {
            background-color: var(--primary-color) !important;
            color: #fff !important;
        }
    </style>
</head>

<body>

    <!-- Fragmento NAVBAR Superior -->
    <nav th:fragment="navbar" class="main-header navbar navbar-expand navbar-white navbar-light">
        <!-- Left navbar links -->
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>

        <!-- Right navbar links -->
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" th:if="${session.usuarioId != null}" th:href="@{/logout}"
                    style="color: #dc3545; font-weight: bold;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
            </li>
        </ul>
    </nav>

    <!-- Fragmentos Compartidos del Sidebar -->
    <div th:fragment="sidebar-brand" class="brand-link" style="border-bottom: 1px solid #4a235a;">
        <div class="brand-image img-circle elevation-3 d-flex justify-content-center align-items-center"
            style="background-color: #f4f6f9; color: #5b2c6f; width: 33px; height: 33px; font-weight: 900; font-size: 1.2rem; opacity: .8;">
            C</div>
        <span class="brand-text font-weight-light">Carnet Cultural</span>
    </div>

    <div th:fragment="sidebar-user(rolDefecto)" class="user-panel mt-3 pb-3 mb-3 d-flex align-items-center">
        <div class="image" style="padding-left: 0.8rem;">
            <i class="fas fa-user-circle fa-2x" style="color: #c2c7d0;"></i>
        </div>
        <div class="info">
            <span class="d-block" style="color: #c2c7d0;"
                th:text="${session.usuarioNombre != null ? session.usuarioNombre : rolDefecto}">Usuario</span>
        </div>
    </div>

    <!-- Fragmento SIDEBAR Estudiante -->
    <aside th:fragment="sidebar-estudiante(activeMenu)" class="main-sidebar sidebar-dark-primary elevation-4">
        <!-- Brand Logo -->
        <div th:replace="~{layout :: sidebar-brand}"></div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Sidebar user panel -->
            <div th:replace="~{layout :: sidebar-user('Estudiante')}"></div>

            <!-- Sidebar Menu -->
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu"
                    data-accordion="false">
                    <li class="nav-item">
                        <a th:href="@{/estudiante/eventos}" class="nav-link"
                            th:classappend="${activeMenu == 'eventos-cumplidos'} ? 'active' : ''">
                            <i class="nav-icon fas fa-check-circle"></i>
                            <p>Eventos Cumplidos</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/estudiante/subir-evidencia}" class="nav-link"
                            th:classappend="${activeMenu == 'subir-evidencia'} ? 'active' : ''">
                            <i class="nav-icon fas fa-upload"></i>
                            <p>Subir Evidencia</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/estudiante/proximos-eventos}" class="nav-link"
                            th:classappend="${activeMenu == 'proximos-eventos'} ? 'active' : ''">
                            <i class="nav-icon fas fa-calendar-alt"></i>
                            <p>Próximos Eventos</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <!-- Fragmento SIDEBAR Empleado -->
    <aside th:fragment="sidebar-empleado(activeMenu)" class="main-sidebar sidebar-dark-primary elevation-4">
        <!-- Brand Logo -->
        <div th:replace="~{layout :: sidebar-brand}"></div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Sidebar user panel -->
            <div th:replace="~{layout :: sidebar-user('Empleado')}"></div>

            <!-- Sidebar Menu -->
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu"
                    data-accordion="false">
                    <li class="nav-item">
                        <a th:href="@{/empleado/validaciones}" class="nav-link"
                            th:classappend="${activeMenu == 'validaciones'} ? 'active' : ''">
                            <i class="nav-icon fas fa-clipboard-check"></i>
                            <p>Validación de Evidencias</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/empleado/eventos}" class="nav-link"
                            th:classappend="${activeMenu == 'eventos'} ? 'active' : ''">
                            <i class="nav-icon fas fa-calendar-alt"></i>
                            <p>Gestión de Eventos</p>
                        </a>
                    </li>
                    <!-- Add more employee menus here in the future -->
                </ul>
            </nav>
        </div>
    </aside>

    <!-- Fragmento FOOTER -->
    <footer th:fragment="footer" class="main-footer d-none">
    </footer>

    <!-- Fragmento SCRIPTS -->
    <div th:fragment="scripts">
        <!-- jQuery -->
        <script th:src="@{/plugins/jquery/jquery.min.js}"></script>
        <!-- Bootstrap 4 -->
        <script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
        <!-- AdminLTE App -->
        <script th:src="@{/dist/js/adminlte.min.js}"></script>
    </div>

</body>

</html>
