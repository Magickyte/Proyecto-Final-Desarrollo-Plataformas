<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login')}">
    <title>Login</title>
</head>
<body class="hold-transition login-page" style="background-color: #f4f6f9;">
<div class="login-box">
    <!-- /.login-logo -->
    <div class="card card-outline card-primary elevation-3" style="border-radius: 15px;">
        <div class="card-header text-center pt-4">
            <div class="h1 m-0">
                <b>Carnet</b>Cultural
            </div>
        </div>
        <div class="card-body pb-4">
            <p class="login-box-msg">Inicia sesión para comenzar</p>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius: 10px;">
                <i class="fas fa-exclamation-triangle mr-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="input-group mb-3">
                    <input type="text" id="correo" name="correo" class="form-control" placeholder="Usuario o Correo Electrónico" required autofocus style="border-radius: 10px 0 0 10px;">
                    <div class="input-group-append">
                        <div class="input-group-text" style="border-radius: 0 10px 10px 0;">
                            <span class="fas fa-envelope"></span>
                        </div>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <input type="password" id="contrasena" name="contrasena" class="form-control" placeholder="Contraseña" required style="border-radius: 10px 0 0 10px;">
                    <div class="input-group-append">
                        <div class="input-group-text" style="border-radius: 0 10px 10px 0;">
                            <span class="fas fa-lock"></span>
                        </div>
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-block" style="border-radius: 10px; font-weight: bold;">Ingresar <i class="fas fa-sign-in-alt ml-2"></i></button>
                    </div>
                </div>
            </form>

        </div>
        <!-- /.card-body -->
    </div>
    <!-- /.card -->
</div>
<!-- /.login-box -->

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
